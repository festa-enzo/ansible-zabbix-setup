- name: Instalar Zabbix com Nginx
  hosts: zabbix_server
  become: true
  vars_files: ./vars.yml
  tasks:
    - name: Atualizar pacotes
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Garantir firewalld ativo
      ansible.builtin.service:
       name: firewalld
       state: started
       enabled: true

    - name: Instalar repo do Zabbix
      ansible.builtin.dnf: 
        name: https://repo.zabbix.com/zabbix/6.0/rhel/9/x86_64/zabbix-release-6.0-4.el9.noarch.rpm
        state: present
        disable_gpg_check: true

    - name: Atualizar cache
      ansible.builtin.dnf:
        update_cache: yes

    - name: Instalar Zabbix, Nginx e MariaDB
      ansible.builtin.dnf:
        name:
          - zabbix-server-mysql
          - zabbix-web-mysql
          - zabbix-nginx-conf
          - zabbix-sql-scripts
          - mariadb-server
          - nginx
          - php-fpm
        state: present

    - name: Iniciar MariaDB
      ansible.builtin.service:
         name: mariadb
         state: started
         enabled: true
    
    - name: Habilitar log_bin_trust_function_creators
      community.mysql.mysql_query:
        query: "SET GLOBAL log_bin_trust_function_creators = 1"
        login_unix_socket: /var/lib/mysql/mysql.sock


    - name: Instalar PyMySQL
      ansible.builtin.dnf:
         name: python3-PyMySQL
         state: present

    - name: Criar banco
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        encoding: utf8mb4       # faz com que o banco possa usar caracteres especiais nas suas tabelas
        collation: utf8mb4_bin  # faz com que as letras maiusculas sejam de vistas de froma diferentes das letras minusculas
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock

    - name: Criar usuário do banco
      community.mysql.mysql_user:
         name: "{{ db_user }}"
         password: "{{ db_password }}"
         priv: "{{ db_name }}.*:ALL"
         state: present
         login_user: root
         login_unix_socket: /var/lib/mysql/mysql.sock

    - name: Verificar se schema já foi importado
      ansible.builtin.shell: >
        mysql -u{{ db_user }} -p'{{ db_password }}' {{ db_name }} -e "SHOW TABLES LIKE 'users';"
      register: db_check
      changed_when: false

    - name: Importar schema se necessário
      ansible.builtin.shell: >
        zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql --default-character-set=utf8mb4 -u{{ db_user }} -p'{{ db_password }}' {{ db_name }}
      when: db_check.stdout == ""

    - name: Desabilitar log_bin_trust_function_creators
      community.mysql.mysql_query:
        query: "SET GLOBAL log_bin_trust_function_creators = 0"
        login_unix_socket: /var/lib/mysql/mysql.sock


    - name: Configurar DBPassword
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_server.conf
        regexp: '^# DBPassword='
        line: "DBPassword={{ db_password }}"

    - name: Configurar DBHost
      ansible.builtin.lineinfile:
       path: /etc/zabbix/zabbix_server.conf
       regexp: '^# DBHost='
       line: 'DBHost=localhost'

    - name: Ajustar Nginx para Zabbix
      ansible.builtin.lineinfile:
        path: /etc/nginx/conf.d/zabbix.conf
        regexp: 'listen'
        line: '        listen 80;'

    - name: Iniciar serviços
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - zabbix-server
        - nginx
        - php-fpm

    - name: Liberar HTTP
      ansible.posix.firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes